<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FairwayFinder — Live Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    /* default (regular tour event) theme — overridden by data-theme */
    --bg:#0b120e;--bg2:#080d0a;--bgTop:#16211b;--edge:#22302a;--edge2:rgba(34,48,42,.6);
    --gold:#43c948;--goldB:#7ce07f;--cream:#eef2ee;--muted:#8d978d;--accent:#43c948;
    --crestA:#16321f;--crestB:#0a1810;--glow:rgba(67,201,72,.25);
    --hdWash:rgba(20,40,30,.4);--bannerBg:#0e3a23;--bannerTx:#7ce07f;
    --leadWash:linear-gradient(90deg,rgba(255,210,74,.12),transparent 60%);
    --watchA:#8a2a1e;--watchB:#c0392b;--watchEdge:#c0392b;--watchGlow:rgba(192,57,43,.5);--watchGlow2:rgba(255,107,90,.75);
    --watchRow:linear-gradient(90deg,rgba(192,57,43,.18),transparent 70%);
    --red-soft:#e57373;--mist:#9fe6a2;--up:#6cc38a;
    --crownChar:'\2605';
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#070d09;color:var(--cream);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased}
  body{padding:0 0 80px}

  /* ---------- top bar ---------- */
  .topbar{position:sticky;top:0;z-index:50;backdrop-filter:blur(10px);
    background:linear-gradient(180deg, var(--hdWash), rgba(8,13,10,.85));
    border-bottom:1px solid var(--edge);padding:11px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:11px;margin-right:auto;min-width:0}
  .crest{width:38px;height:38px;border-radius:50%;border:2px solid var(--gold);flex:none;
    display:flex;align-items:center;justify-content:center;font-size:18px;
    background:radial-gradient(circle at 30% 30%, var(--crestA), var(--crestB));box-shadow:0 0 14px var(--glow)}
  .brand .name{font-family:'Fraunces',serif;font-size:20px;font-weight:900;letter-spacing:-.01em;line-height:1}
  .brand .name .f{color:var(--goldB)}
  .brand .sub{font-size:9.5px;color:var(--muted);font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brand .sub .hl{color:var(--accent)}
  .evbox{text-align:right;margin-right:2px}
  .evbox .ev{font-family:'Fraunces',serif;font-style:italic;color:var(--goldB);font-size:12px;line-height:1.2}
  .refresh-pill{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;color:var(--muted);
    background:rgba(0,0,0,.25);border:1px solid var(--edge);padding:5px 11px;border-radius:20px;font-variant-numeric:tabular-nums}
  .refresh-pill .rp-dot{width:6px;height:6px;border-radius:50%;background:var(--gold)}
  .refresh-pill.low{color:var(--goldB);border-color:#4a3f15}.refresh-pill.low .rp-dot{background:var(--goldB)}
  .refresh-pill.out{color:var(--red-soft);border-color:#3a2020}.refresh-pill.out .rp-dot{background:var(--watchB)}
  .viewer-note{font-size:10.5px;color:var(--muted);background:rgba(0,0,0,.2);border:1px solid var(--edge);padding:5px 10px;border-radius:20px;font-weight:600}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
  .modal-box{background:var(--bg2);border:1px solid var(--edge);border-radius:14px;max-width:720px;width:100%;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--edge)}
  .modal-head h2{margin:0;font-size:18px}
  .modal-x{background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;line-height:1;padding:0 4px}
  .modal-x:hover{color:var(--cream)}
  .modal-body{padding:16px 20px;overflow-y:auto}
  .verify-banner{padding:10px 14px;border-radius:9px;font-weight:700;font-size:13.5px;margin-bottom:14px}
  .verify-banner.ok{background:rgba(67,201,72,.12);border:1px solid #1e4a20;color:var(--mist)}
  .verify-banner.warn{background:rgba(192,57,43,.12);border:1px solid #5a2018;color:var(--red-soft)}
  .verify-source-note{font-size:12px;color:var(--muted);margin-bottom:10px;line-height:1.5}
  .verify-table{width:100%;border-collapse:collapse;font-size:13px}
  .verify-table th{text-align:left;color:var(--muted);font-weight:700;font-size:11px;letter-spacing:.03em;padding:6px 8px;border-bottom:1px solid var(--edge)}
  .verify-table td{padding:7px 8px;border-bottom:1px solid var(--edge2)}
  .verify-tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;display:inline-block}
  .verify-tag.match{background:rgba(67,201,72,.15);color:var(--mist)}
  .verify-tag.mismatch{background:rgba(192,57,43,.18);color:var(--red-soft)}
  .verify-tag.nodata{background:rgba(255,255,255,.08);color:var(--muted)}
  .btn{border:1px solid var(--edge);background:rgba(0,0,0,.2);color:var(--cream);padding:8px 14px;border-radius:9px;
    font-size:12.5px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:.15s;white-space:nowrap;font-family:inherit}
  .btn:hover{border-color:var(--gold)}
  .btn.primary{background:var(--gold);border-color:var(--gold);color:#071008}
  .btn.ghost{background:transparent}
  .btn svg{width:14px;height:14px}
  .btn.spin svg{animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .btn:disabled{opacity:.5;cursor:default}

  /* ---------- event banner strip ---------- */
  .evbanner{text-align:center;padding:7px 18px;font-family:'Fraunces',serif;font-style:italic;font-size:12px;
    color:var(--bannerTx);background:linear-gradient(90deg,transparent,var(--bannerBg),transparent);
    border-bottom:1px solid var(--edge2)}

  .wrap{max-width:840px;margin:0 auto;padding:18px 16px}
  .tabs{display:flex;gap:4px;margin-bottom:18px;background:rgba(0,0,0,.22);padding:5px;border-radius:12px;border:1px solid var(--edge);width:fit-content}
  .tab{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;border:none;background:transparent;font-family:inherit}
  .tab.active{background:var(--gold);color:#071008}
  .tab:hover:not(.active){color:var(--cream)}

  .panel{background:rgba(0,0,0,.18);border:1px solid var(--edge);border-radius:16px;overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,.4)}
  .panel + .panel{margin-top:16px}
  .panel-head{padding:14px 20px;border-bottom:1px solid var(--edge2);display:flex;align-items:center;gap:11px}
  .panel-head h2{font-family:'Fraunces',serif;font-size:16px;font-weight:600}
  .panel-head .meta{font-size:12px;color:var(--muted);margin-left:auto;font-weight:600;font-variant-numeric:tabular-nums}
  .live-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 var(--glow)}70%{box-shadow:0 0 0 7px transparent}100%{box-shadow:0 0 0 0 transparent}}

  /* ---------- LEADERBOARD (ranked rows) ---------- */
  .lb-colhd{display:flex;align-items:center;padding:9px 20px;background:rgba(0,0,0,.22);color:var(--muted);
    font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;font-weight:700}
  .lb-colhd .a{width:42px}.lb-colhd .b{flex:1}.lb-colhd .c{width:92px;text-align:center}.lb-colhd .d{width:120px;text-align:right}
  .lb-rows{position:relative}
  .lb-row{display:flex;align-items:center;padding:15px 20px;gap:13px;position:absolute;left:0;right:0;
    border-bottom:1px solid var(--edge2);
    transition:transform .7s cubic-bezier(.34,1.15,.4,1), background .4s}
  .lb-pos{width:42px;display:flex;align-items:center;gap:5px}
  .lb-pos .num{font-family:'Fraunces',serif;font-weight:900;font-size:20px;color:var(--gold)}
  .lb-pos .arrow{font-size:11px;font-weight:800;opacity:0;transition:opacity .3s;width:11px}
  .lb-pos .arrow.up{color:var(--up)}.lb-pos .arrow.down{color:var(--red-soft)}
  .lb-pos .arrow.show{opacity:1}
  .lb-who{flex:1;min-width:0}
  .lb-who b{font-family:'Fraunces',serif;color:var(--cream);font-size:16px;font-weight:600;display:block;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lb-who i{color:var(--muted);font-size:10.5px;font-style:normal;letter-spacing:.05em;text-transform:uppercase}
  .lb-odds{width:92px;display:flex;justify-content:center}
  .chip{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap;
    border:1px solid var(--edge2);color:var(--muted);background:rgba(0,0,0,.22)}
  .chip.warm{border-color:#5a4a1e;color:var(--goldB);background:rgba(201,166,78,.08)}
  .chip.watch{border-color:var(--watchEdge);color:#fff;background:linear-gradient(90deg,var(--watchA),var(--watchB));
    box-shadow:0 0 13px var(--watchGlow);animation:sizzle 1.3s ease-in-out infinite}
  @keyframes sizzle{0%,100%{box-shadow:0 0 9px var(--watchGlow)}50%{box-shadow:0 0 19px var(--watchGlow2)}}
  .lb-amt{width:120px;text-align:right;font-family:'Fraunces',serif;font-weight:600;color:var(--cream);font-size:18px;font-variant-numeric:tabular-nums}
  .lb-amt .metaline{display:block;font-family:Inter;font-size:9.5px;font-weight:600;color:var(--muted);font-style:normal;margin-top:2px}
  .lb-row.leader{background:var(--leadWash)}
  .lb-row.leader .num,.lb-row.leader .lb-amt{color:var(--goldB)}
  .lb-row.leader .lb-who b::after{content:var(--crownChar);font-size:11px;margin-left:6px;filter:grayscale(.1)}
  .lb-row.bwatch{background:var(--watchRow)}
  .lb-row.bwatch .num{color:var(--red-soft)}
  .lb-row.bwatch::before{content:'';position:absolute;inset:0;pointer-events:none;
    background:linear-gradient(90deg,transparent,rgba(255,107,90,.06),transparent);background-size:200% 100%;animation:heat 2.4s linear infinite}
  @keyframes heat{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .lb-row.bump{animation:bump 1.1s ease}
  @keyframes bump{0%{background-color:rgba(108,195,138,.16)}100%{background-color:transparent}}
  .lb-amt.flash{animation:flashgold .8s ease}
  @keyframes flashgold{0%{color:var(--goldB);transform:scale(1.05)}100%{color:inherit;transform:scale(1)}}
  .confetti{position:absolute;width:8px;height:12px;top:-16px;pointer-events:none;border-radius:1px;opacity:0}

  .hint{font-size:11.5px;color:var(--muted);padding:12px 20px;line-height:1.55;border-top:1px solid var(--edge2);background:rgba(0,0,0,.14)}
  .hint b{color:var(--cream)}
  .hint code{background:rgba(0,0,0,.3);padding:2px 6px;border-radius:4px;color:var(--mist);font-size:10.5px}

  /* ---------- detail + grid tables ---------- */
  table{width:100%;border-collapse:collapse}
  thead th{text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700;padding:10px 14px;border-bottom:1px solid var(--edge2)}
  thead th.c{text-align:center}
  tbody td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--edge2);font-variant-numeric:tabular-nums}
  tbody tr:last-child td{border-bottom:none}
  tbody td.c{text-align:center}
  .gname{font-weight:600;font-family:'Fraunces',serif}.gname.mc{color:var(--red-soft)}
  .mc-tag{font-size:9px;color:var(--red-soft);font-weight:700;margin-left:6px}
  /* Cut-line dividers inside team tables */
  .cut-divider td{padding:3px 20px 5px;text-align:center;font-size:9.5px;letter-spacing:.12em;font-weight:800}
  .cut-divider.proj td{border-top:2px dashed var(--gold);color:var(--gold)}
  .cut-divider.final td{border-top:2px solid var(--red-soft);color:var(--red-soft)}
  /* Aerial golf-course background — original art, detail lives in the side
     thirds; a built-in center fade keeps the content column clean. */
  #courseBg{position:fixed;inset:0;z-index:0;pointer-events:none}
  #courseBg svg{width:100%;height:100%;display:block}
  .wrap,.topbar,.evbanner{position:relative;z-index:1}
  @media(max-width:1199px){#courseBg{display:none}}
  .score{font-weight:700}.prize{color:var(--mist);font-weight:700}.pos{color:var(--muted);font-weight:700}
  .chk{display:inline-flex;align-items:center;justify-content:center;width:23px;height:23px;border-radius:6px;font-size:12px;font-weight:800}
  .chk.yes{background:var(--gold);color:#071008}.chk.no-cut{background:var(--watchB);color:#fff}
  .tier-row td{background:rgba(0,0,0,.2);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);padding:8px 14px}
  .tier-row.t4 td{color:var(--goldB)}.tier-row.t3 td{color:var(--accent)}
  .total-row td{background:rgba(0,0,0,.25);font-weight:800;border-top:2px solid var(--edge)}
  .total-row .prize{color:var(--goldB);font-size:14px;font-family:'Fraunces',serif}

  /* ---------- teams editor ---------- */
  .setup{padding:18px}
  .owner-edit{background:rgba(0,0,0,.2);border:1px solid var(--edge);border-radius:13px;padding:15px;margin-bottom:13px}
  .owner-edit-head{display:flex;gap:9px;align-items:center;margin-bottom:11px}
  .inp{background:rgba(0,0,0,.3);border:1px solid var(--edge);color:var(--cream);border-radius:8px;padding:9px 11px;font-size:14px;font-weight:600;font-family:inherit}
  .inp:focus{outline:none;border-color:var(--gold)}
  .inp.team{font-weight:800;font-size:15px;flex:1;font-family:'Fraunces',serif}.inp.sm{font-size:12px;padding:7px 10px;width:140px}
  .upload-row{display:flex;align-items:center;gap:10px;margin-bottom:11px;flex-wrap:wrap}
  .upbtn{font-size:12px}.upbtn.spin svg{animation:spin 1s linear infinite}
  .upnote{font-size:11px;font-weight:600;color:var(--muted);flex:1 1 200px;word-break:break-word}.upnote.ok{color:var(--mist)}.upnote.err{color:var(--red-soft)}
  .picks-list{display:flex;flex-direction:column;gap:6px}
  .pick-row{display:flex;gap:8px;align-items:center}
  .pick-row .num{font-size:11px;color:var(--muted);font-weight:700;width:20px;text-align:right}
  .pick-row .inp{flex:1}
  .pick-row .del{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px 8px;border-radius:6px}
  select.pickselect{appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%238d978d' stroke-width='2'><path d='M6 9l6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right 10px center;background-size:14px;padding-right:32px;cursor:pointer}
  .pick-row .del:hover{color:var(--red-soft);background:rgba(0,0,0,.2)}
  .rm-owner{margin-left:auto;background:transparent;border:1px solid #3a2020;color:var(--red-soft);padding:6px 11px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
  .lock{padding:50px 20px;text-align:center;color:var(--muted)}
  .lock h3{color:var(--cream);font-size:16px;margin-bottom:8px;font-family:'Fraunces',serif}
  .lock input{margin:14px auto 0;display:block;text-align:center;max-width:240px}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(90px);background:var(--gold);color:#071008;
    padding:11px 20px;border-radius:11px;font-size:13px;font-weight:700;box-shadow:0 12px 30px rgba(0,0,0,.4);z-index:200;opacity:0;transition:.3s;
    max-width:min(90vw,520px);text-align:center;white-space:normal;line-height:1.4}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  .toast.err{background:var(--watchB);color:#fff}

  @media(max-width:560px){
    .wrap{padding:14px 11px}
    .brand .sub{max-width:150px}
    .lb-amt{width:104px;font-size:16px}
    .lb-odds{width:78px}
    .evbox{display:none}
  }

  /* ============ THEME PACKS ============ */
  [data-theme="masters"]{
    --bg:#0a2417;--bg2:#071c11;--bgTop:#0f3a23;--edge:#1d5238;--edge2:rgba(29,82,56,.5);
    --gold:#d8c24a;--goldB:#ecd94a;--cream:#f4efe2;--muted:#9fb295;--accent:#f2a0c0;
    --crestA:#155232;--crestB:#0a2b1a;--glow:rgba(236,217,74,.35);
    --hdWash:rgba(20,66,44,.45);--bannerBg:rgba(236,217,74,.1);--bannerTx:#ecd94a;
    --leadWash:linear-gradient(90deg,rgba(236,217,74,.14),transparent 60%);
    --crownChar:'\1F3C6';
  }
  [data-theme="pga"]{
    --bg:#0c1220;--bg2:#080d18;--bgTop:#16233f;--edge:#2a3a54;--edge2:rgba(42,58,84,.55);
    --gold:#c3c9d4;--goldB:#e0c66a;--cream:#f2f5fa;--muted:#8592aa;--accent:#e0c66a;
    --crestA:#28374f;--crestB:#141d30;--glow:rgba(195,201,212,.3);
    --hdWash:rgba(22,35,63,.5);--bannerBg:rgba(200,204,214,.1);--bannerTx:#cdd3de;
    --leadWash:linear-gradient(90deg,rgba(224,198,106,.14),transparent 60%);
    --crownChar:'\1F3C6';
  }
  [data-theme="usopen"]{
    --bg:#0a1834;--bg2:#08101c;--bgTop:#132a4a;--edge:#1e3a6a;--edge2:rgba(30,58,106,.5);
    --gold:#d4b23e;--goldB:#e6d089;--cream:#f4f1e8;--muted:#8fa3c8;--accent:#ff6b7d;
    --crestA:#14346a;--crestB:#0a1c3e;--glow:rgba(212,178,62,.35);
    --hdWash:rgba(10,35,82,.5);--bannerBg:#0a2352;--bannerTx:#e6d089;
    --leadWash:linear-gradient(90deg,rgba(212,178,62,.16),transparent 60%);
    --crownChar:'\1F3C6';
  }
  [data-theme="open"]{
    --bg:#0d1f2b;--bg2:#081620;--bgTop:#16344a;--edge:#24455a;--edge2:rgba(36,69,90,.5);
    --gold:#c9a24e;--goldB:#e8c877;--cream:#f4eede;--muted:#8fa88a;--accent:#e8a0b4;
    --crestA:#1c3d52;--crestB:#0c2230;--glow:rgba(201,162,78,.35);
    --hdWash:rgba(125,31,58,.28);--bannerBg:#5c142a;--bannerTx:#e8c877;
    --leadWash:linear-gradient(90deg,rgba(201,162,78,.15),transparent 60%);
    --watchA:#5c142a;--watchB:#7d1f3a;--watchEdge:#7d1f3a;--watchGlow:rgba(178,58,92,.55);
    --watchRow:linear-gradient(90deg,rgba(125,31,58,.22),transparent 70%);
    --crownChar:'\1F3C6';
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="crest" id="crest">⛳</div>
    <div style="min-width:0">
      <div class="name">Fairway<span class="f">Finder</span></div>
      <div class="sub" id="brandSub">Live Tournament Tracker</div>
    </div>
  </div>
  <div class="evbox"><div class="ev" id="evLine"></div></div>
  <span class="refresh-pill" id="refreshPill" title="Auto-updates every 10 seconds"><span class="rp-dot"></span><span id="rpText">Loading…</span></span>
  <button class="btn" id="refreshBtn" onclick="manualRefresh()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.5 9a9 9 0 0114.9-3.4L23 10M1 14l4.6 4.4A9 9 0 0020.5 15"/></svg>
    <span>Refresh scores</span>
  </button>
  <button class="btn ghost" id="verifyBtn" onclick="openVerifyModal()" title="Cross-check final payouts against independent sources once the tournament is over">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
    <span>Verify payouts</span>
  </button>
</div>
<div class="evbanner" id="evBanner">⛳ Every stroke counts</div>

<div id="verifyModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeVerifyModal()">
  <div class="modal-box">
    <div class="modal-head">
      <h2>Verify final payouts</h2>
      <button class="modal-x" onclick="closeVerifyModal()">×</button>
    </div>

<script>
/* ============================================================

const SUPABASE_URL = "https://ekoeualqcfpebdvnqjat.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_ndnevG8DDuMdHfTZqqYARQ_AYFOE4mu";

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// BETA: open to everyone — no login. Teams tab is editable by anyone with the link.

const PCT = {1:.18,2:.108,3:.068,4:.048,5:.04,6:.0362,7:.0337,8:.0312,9:.0292,10:.0272,
  11:.0252,12:.0232,13:.0215,14:.02,15:.0188,16:.0177,17:.0167,18:.0158,19:.015,20:.0143,
  21:.0136,22:.013,23:.0124,24:.0119,25:.0114,26:.011,27:.0106,28:.0102,29:.0098,30:.0095,
  35:.0079,40:.0064,45:.0052,50:.0042,55:.0038,60:.0035,65:.0032,70:.003};
// $ value of ONE solo position — the building block for tie-splitting below.
// Not exported for direct use elsewhere; real payouts always go through the
// tie-aware map, since a raw position number alone doesn't know who it's tied with.
function _prizeForSinglePos(n, purse){
  const keys=Object.keys(PCT).map(Number).sort((a,b)=>a-b);
  for(const k of keys){ if(n<=k) return (purse||22500000)*PCT[k]; }
  return (purse||22500000)*.0025;
}
// Real tournament payouts split the combined prize money for every position a
// tied group occupies evenly across that group — two golfers tied for 2nd each
// get the AVERAGE of 2nd+3rd place money, not solo-2nd money each. This scans
// the FULL field (not just picked golfers — someone else's tie still shifts
// who's really in 4th) and builds normName -> $ accordingly. Cached per
// scores+purse signature since it's a full-field scan, not a cheap lookup.
//
// Status handling matches real tour rules: DQ is always $0, like a missed cut.
// A withdrawal is $0 if it happened before making the cut, but real tours
// still pay LAST-PLACE money for a withdrawal after the cut (e.g. an injury
// during Saturday's round) — not their position when they left, and not part
// of the normal tie-grouping either, since it's a flat payout on top of the
// regular field (matches how tours handle a "more than the nominal cut made
// it" purse bump).
let _prizeMapCache = null, _prizeMapSig = '';
function buildPrizeMap(){
  const scores = STATE.scores||{};
  const purse = STATE.purse||22500000;
  const sig = purse+'|'+Object.keys(scores).sort().map(k=>k+':'+scores[k].pos+':'+scores[k].score).join(',');
  if(_prizeMapSig===sig) return _prizeMapCache;
  const groups={}; // numeric score-to-par -> [normNames tied at that score]
  const wdPaidNames=[];
  for(const [nm,s] of Object.entries(scores)){
    if(!s) continue;
    if(s.pos==='WD_PAID'){ wdPaidNames.push(nm); continue; }
    if(s.pos==='MC' || s.pos==='DQ' || s.score==null || typeof s.score!=='number') continue;
    (groups[s.score]=groups[s.score]||[]).push(nm);
  }
  const sortedScores=Object.keys(groups).map(Number).sort((a,b)=>a-b); // best (lowest) first
  const map={};
  let cursor=1; // 1-indexed leaderboard position
  for(const sc of sortedScores){
    const names=groups[sc], k=names.length;
    let sum=0; for(let i=0;i<k;i++) sum+=_prizeForSinglePos(cursor+i, purse);
    const share=Math.round(sum/k/1000)*1000;
    for(const nm of names) map[nm]=share;
    cursor+=k;
  }
  if(wdPaidNames.length){
    // "Last place" = the payout for the total number who made the cut,
    // scored players plus these withdrawals — each WD gets that flat amount
    // independently (they're not tied with each other in a scoring sense).
    const madeCutCount = (cursor-1) + wdPaidNames.length;
    const lastPlace = Math.round(_prizeForSinglePos(madeCutCount, purse)/1000)*1000;
    for(const nm of wdPaidNames) map[nm]=lastPlace;
  }
  _prizeMapCache=map; _prizeMapSig=sig;
  return map;
}
// Look up one golfer's tie-aware prize by trying the same name-key variants
// scoreFor() uses, so it always matches whichever key STATE.scores stored it under.
function prizeForGolfer(g){
  const map = buildPrizeMap();
  for(const k of nameKeys(g)){ if(STATE.scores && STATE.scores[k] && map[k]!=null) return map[k]; }
  return 0;
}
function norm(name){
  return String(name||'').toLowerCase()
    .replace(/[åäâ]/g,'a').replace(/[éèê]/g,'e').replace(/[íì]/g,'i')
    .replace(/[óòö]/g,'o').replace(/[úü]/g,'u').replace(/ø/g,'o')
    .replace(/[^a-z ]/g,'').replace(/\s+/g,' ').trim();
}
// Common English first-name nickname groups — so "Matt Fitzpatrick" (e.g. from
// the screenshot-fill feature, which naturally writes names the way people
// actually say them) still matches "Matthew Fitzpatrick" (the fuller form
// live feeds tend to use), without requiring an exact spelling match.
const NICKNAME_GROUPS = [
  ['matt','matthew'], ['chris','christopher'], ['mike','michael','mick'],
  ['alex','alexander'], ['sam','samuel'], ['will','william','bill','billy'],
  ['nick','nicholas'], ['zach','zachary','zack'], ['ben','benjamin'],
  ['joe','joseph','joey'], ['tom','thomas','tommy'], ['dan','daniel','danny'],
  ['rob','robert','bob','bobby'], ['jon','jonathan','john','johnny'],
  ['cam','cameron'], ['tony','anthony'], ['ed','edward','eddie'],
  ['rick','richard','dick','ricky'], ['greg','gregory'], ['steve','steven','stephen'],
  ['dave','david','davey'], ['jim','james','jimmy'], ['charlie','charles','chuck'],
  ['andy','andrew'], ['pat','patrick'], ['ken','kenneth','kenny'],
  ['jeff','jeffrey'], ['brad','bradley'], ['josh','joshua'],
  ['tim','timothy'], ['ted','theodore','teddy'], ['harry','harold'],
];
const NICKNAME_MAP = (() => {
  const m = {};
  for(const g of NICKNAME_GROUPS) for(const w of g) m[w]=g;
  return m;
})();
function firstNameVariants(word){ return NICKNAME_MAP[word] || [word]; }
function nameKeys(name){
  const n=norm(name); const keys=new Set([n]);
  if(n.includes(',')){ const [l,f]=n.split(',').map(s=>s.trim()); keys.add(norm(f+' '+l)); }
  for(const k of [...keys]){
    const parts=k.split(' ');
    if(parts.length>=2){
      for(const v of firstNameVariants(parts[0])){
        if(v!==parts[0]) keys.add([v,...parts.slice(1)].join(' '));
      }
    }
  }
  return [...keys];
}

let STATE = {event_name:'',purse:22500000,purse_event_name:null,owners:[],scores:{},breakfast:{},field:[],cut_line:null,updated_at:null};
let dataLoaded=false; // true once the first real /api/state response has arrived
let view='board';
let prevOrder=[];      // for overtake arrows
let lbNodes={};        // owner id -> row element
let builtSig='';       // signature of current row set (to know when to rebuild vs animate)

function scoreFor(g){ for(const k of nameKeys(g)){ if(STATE.scores&&STATE.scores[k]) return STATE.scores[k]; } return null; }
// Short display tag for a golfer who's no longer accumulating a live score —
// missed cut, disqualified, or withdrew. Returns null if still playing normally.
function doneStatus(sc){
  if(!sc) return null;
  if(sc.pos==='MC') return 'MC';
  if(sc.pos==='DQ') return 'DQ';
  if(sc.pos==='WD_PAID') return 'WD';
  return null;
}

/* =================== THEME ENGINE =================== */
const THEMES = {
  masters:{ key:'masters', crest:'⛳', sub:'The Masters · <span class="hl">Augusta National</span>',
    banner:'🌺 A tradition unlike any other · Augusta, Georgia' },
  pga:{ key:'pga', crest:'🏆', sub:'PGA Championship',
    banner:'⛳ Playing for the Wanamaker Trophy' },
  usopen:{ key:'usopen', crest:'🏆', sub:'U.S. Open',
    banner:'🇺🇸 Golf\u2019s toughest test' },
  open:{ key:'open', crest:'🏆', sub:'The Open Championship',
    banner:'⛳ Chasing the Claret Jug' },
  default:{ key:'', crest:'⛳', sub:'Live Tournament Tracker',
    banner:'⛳ Every stroke counts' },
};
function pickTheme(evName){
  const n = String(evName||'').toLowerCase();
  if(/masters/.test(n)) return THEMES.masters;
  if(/pga champ/.test(n) || /\bpga\b/.test(n)) return THEMES.pga;
  if(/u\.?s\.?\s*open/.test(n) || /us open/.test(n)) return THEMES.usopen;
  if(/open champ/.test(n) || /the open/.test(n) || /british open/.test(n) || /\bopen\b/.test(n)) return THEMES.open;
  return THEMES.default;
}
function applyTheme(){
  const t = pickTheme(STATE.event_name);
  document.documentElement.setAttribute('data-theme', t.key);
  document.getElementById('crest').textContent = t.crest;
  // sub shows the event's real name if we have it, else the theme label
  const evn = STATE.event_name && STATE.event_name!=='Tournament' ? STATE.event_name : null;
  document.getElementById('brandSub').innerHTML = evn ? esc(evn) : t.sub;
  document.getElementById('evBanner').innerHTML = t.banner;
}

/* =================== LOAD + REALTIME =================== */
let LAST_FIELD_ERROR = null; // shown on the Teams page so field-fetch issues are self-diagnosing
let LAST_PURSE_ERROR = null; // shown near the purse field so auto-lookup issues are self-diagnosing
async function loadState(refresh){
  try{
    const r = await fetch('/api/state'+(refresh?'?refresh=1':''));
    const data = await r.json();
    LAST_FIELD_ERROR = data._fieldError || r.headers.get('x-field-error') || null;
    LAST_PURSE_ERROR = data._purseError || r.headers.get('x-purse-error') || null;
    applyState(data);
    updateAgeLabel();
    if(data._scoresError || r.headers.get('x-refresh-error')){ toast('Scores feed error: '+(data._scoresError||r.headers.get('x-refresh-error')),'err'); }
  }catch(e){ toast('Could not load','err'); }
}
// Live "Updated Xs ago" label — ticks every second regardless of when the
// last REAL fetch happened, since auto-refresh polls far more often than
// the server actually hits Data Golf (see MIN_REFRESH_INTERVAL_MS server-side).
function updateAgeLabel(){
  const txt = document.getElementById('rpText');
  if(!txt) return;
  if(!STATE.updated_at){ txt.textContent = 'Not yet updated'; return; }
  const secs = Math.max(0, Math.round((Date.now() - new Date(STATE.updated_at).getTime())/1000));
  if(secs < 5) txt.textContent = 'Updated just now';
  else if(secs < 60) txt.textContent = 'Updated '+secs+'s ago';
  else txt.textContent = 'Updated '+Math.round(secs/60)+'m ago';
}
setInterval(updateAgeLabel, 1000);
function applyState(d){
  if(!d) return;
  dataLoaded=true;
  STATE = {
    event_name:d.event_name||STATE.event_name||'Tournament',
    purse:d.purse||STATE.purse||22500000,
    purse_event_name:d.purse_event_name!==undefined?d.purse_event_name:STATE.purse_event_name,
    owners:d.owners||STATE.owners||[],
    scores:d.scores||STATE.scores||{},
    breakfast:d.breakfast||STATE.breakfast||{},
    field:d.field||STATE.field||[],
    cut_line:d.cut_line!==undefined?d.cut_line:STATE.cut_line,
    updated_at:d.updated_at||STATE.updated_at
  };
  applyTheme();
  render();
}
sb.channel('pool')
  .on('postgres_changes',{event:'UPDATE',schema:'public',table:'pool_state'},
      payload=>{
        applyState(payload.new);
        updateAgeLabel();
      })
  .subscribe();

/* =================== VIEWS =================== */
function setView(v){
  view=v;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===v));
  ['board','grid','real','setup'].forEach(x=>document.getElementById('view-'+x).style.display=x===v?'':'none');
  if(v!=='board') builtSig=''; // force fresh build when returning to board
  render();
}
function computeStandings(){
  return STATE.owners.map(o=>{
    let total=0,alive=0,mc=0;
    const rows=(o.picks||[]).map(g=>{
      const sc=scoreFor(g); const tag=doneStatus(sc); const isMC=!!tag;
      const prize=sc?prizeForGolfer(g):0;
      if(sc){ isMC?mc++:alive++; } total+=prize;
      return {golfer:g,sc,prize,isMC,tag};
    });
    return {...o,total,alive,mc,rows};
  }).sort((a,b)=>b.total-a.total);
}
function fmt(n){return '$'+(n||0).toLocaleString('en-US');}
function parToStr(n){
  if(n==null) return '—';
  const v=Number(n);
  if(isNaN(v)) return String(n);
  if(v===0) return 'E';
  return v>0 ? '+'+v : String(v);
}
// Projected cut line — Data Golf's "2-3 most likely cut scores, with
// probabilities" widget. Quietly renders nothing if this data isn't available
// (e.g. before the tournament starts, after the cut is already final, or if
// the feed doesn't expose it) rather than showing an empty/broken box.
// How many players (plus ties) make the cut — varies by tournament.
function cutTopN(){
  const n=String(STATE.event_name||'').toLowerCase();
  if(/masters/.test(n)) return 50;
  if(/pga championship/.test(n)) return 70;
  if(/u\.?s\.? open/.test(n)) return 60;
  if(/open championship|the open\b/.test(n)) return 70;
  return 65; // standard PGA Tour cut
}
// The single source of truth for the projected cut, used by both the widget
// and the team-table dividers.
// Priority 1: Data Golf's probabilistic cut model, if it's ever available
//   (their public API doesn't currently expose it — website-only feature).
// Priority 2 (the working path): computed from the live scores we already
//   have — the score currently held by the Nth-ranked player, where N is
//   this tournament's cut number. Everyone at that score makes the cut on
//   the number, which the divider logic already respects.
// Returns null once the cut is actually made (round 3+, or MC statuses exist).
function projectedCut(){
  const entries=Object.values(STATE.scores||{});
  const cutDone=entries.some(s=>s&&s.pos==='MC');
  if(cutDone) return null;
  const cl=STATE.cut_line;
  if(cl&&Array.isArray(cl)&&cl.length){
    const s=[...cl].filter(x=>x&&x.score!=null).sort((a,b)=>(b.prob||0)-(a.prob||0));
    const v=s.length?Number(s[0].score):NaN;
    if(!isNaN(v)) return {score:v, source:'model', dist:s.slice(0,3)};
  }
  const live=entries.filter(s=>s&&typeof s.score==='number'&&!doneStatus(s));
  if(!live.length) return null;
  const maxRound=Math.max(...live.map(s=>s.round||1));
  if(maxRound>=3) return null; // weekend — cut already happened
  const N=cutTopN();
  if(live.length<=N) return null; // whole remaining field inside the number
  const sorted=live.map(s=>s.score).sort((a,b)=>a-b);
  return {score:sorted[N-1], source:'computed', topN:N};
}
function renderCutLineBox(){
  const pc=projectedCut();
  if(!pc) return '';
  if(pc.source==='model'){
    const items=pc.dist.map(x=>`
      <div style="text-align:center;min-width:70px">
        <div style="font-family:'Fraunces',serif;font-size:22px;font-weight:700;color:var(--cream)">${esc(parToStr(x.score))}</div>
        <div style="font-size:12px;color:var(--gold);font-weight:700">${x.prob!=null?Math.round(x.prob*100)+'%':'—'}</div>
      </div>`).join('');
    return `<div class="panel" style="padding:14px 20px;margin-bottom:14px">
      <div style="font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.03em;margin-bottom:10px">PROJECTED CUT LINE</div>
      <div style="display:flex;gap:24px">${items}</div>
    </div>`;
  }
  return `<div class="panel" style="padding:14px 20px;margin-bottom:14px;display:flex;align-items:center;gap:16px;flex-wrap:wrap">
    <div style="font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.03em">PROJECTED CUT LINE</div>
    <div style="font-family:'Fraunces',serif;font-size:24px;font-weight:700;color:var(--gold)">${esc(parToStr(pc.score))}</div>
    <div style="font-size:12px;color:var(--muted)">Top ${pc.topN} &amp; ties · computed live from the current leaderboard</div>
  </div>`;
}
function scoreStr(sc){ if(!sc)return '—'; const tag=doneStatus(sc); if(tag) return tag; const s=sc.score; if(s===0||s==='E')return 'E'; if(typeof s==='number')return s>0?'+'+s:''+s; return s; }
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

const ROWH = 62;
function renderBoard(){
  const st=computeStandings();
  const any=STATE.scores&&Object.keys(STATE.scores).length>0;
  const bk=STATE.breakfast||{};
  const hasBk=Object.keys(bk).length>0;
  const container=document.getElementById('view-board');

  const sig = st.map(o=>o.id).slice().sort((a,b)=>a-b).join(',')+'|'+st.length;
  const orderNow = st.map(o=>o.id);

  // (re)build the shell if the set of owners changed or first render
  if(builtSig!==sig){
    let head=`<div id="cutLineBox"></div><div class="panel"><div class="panel-head">${any?'<span class="live-dot"></span>':''}<h2>Standings</h2><span class="meta" id="updMeta"></span></div>`;
    head+=`<div class="lb-colhd"><div class="a">Pos</div><div class="b">Owner</div><div class="c">Breakfast</div><div class="d">Earnings</div></div>`;
    head+=`<div class="lb-rows" id="lbRows" style="height:${st.length*ROWH}px"></div>`;
    head+=`<div class="hint" id="lbHint"></div></div><div id="lbDetail"></div>`;
    container.innerHTML=head;
    lbNodes={};
    const rowsEl=document.getElementById('lbRows');
    st.forEach(o=>{
      const r=document.createElement('div'); r.className='lb-row';
      r.innerHTML=`<div class="lb-pos"><span class="num"></span><span class="arrow"></span></div>
        <div class="lb-who"><b></b><i></i></div>
        <div class="lb-odds"><span class="chipspot"></span></div>
        <div class="lb-amt"></div>`;
      rowsEl.appendChild(r); lbNodes[o.id]=r;
    });
    builtSig=sig; prevOrder=orderNow.slice();
    positionRows(st,bk,any,hasBk,true);
  } else {
    positionRows(st,bk,any,hasBk,false);
  }

  // meta + hint + detail
  const upd=STATE.updated_at?new Date(STATE.updated_at).toLocaleString([],{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}):'no scores yet';
  const um=document.getElementById('updMeta'); if(um) um.textContent='Updated: '+upd;
  const hint=document.getElementById('lbHint');
  if(hint) hint.innerHTML=`Prize totals use the ${esc(STATE.event_name)} purse by finishing position. Scores refresh automatically every 10 seconds — tap <b>Refresh scores</b> anytime for an immediate pull.`;
  const clBox=document.getElementById('cutLineBox');
  if(clBox) clBox.innerHTML=renderCutLineBox();

  // Cut-line divider context, shared by every team's table below:
  // before the cut is made, a gold dashed "PROJECTED CUT" line sits between
  // golfers above/below the projected cut (see projectedCut() for how it's
  // derived); once anyone has actually been cut, it becomes a red solid
  // "CUT LINE" between live and cut golfers.
  const pc=projectedCut();
  const projCutScore=pc?pc.score:null;
  const cutHappened=Object.values(STATE.scores||{}).some(s=>s&&s.pos==='MC');
  const cutDividerRow=(kind,score)=>`<tr class="cut-divider ${kind}"><td colspan="4"><span>${kind==='final'?'CUT LINE':'PROJECTED CUT '+esc(parToStr(score))}</span></td></tr>`;

  const detail=st.map(o=>{
    const sorted=[...o.rows].sort((a,b)=>{
      // Done (missed cut / DQ / withdrew) always sinks below anyone still live,
      // regardless of prize amount — matches a real leaderboard's shape.
      if(a.isMC!==b.isMC) return a.isMC?1:-1;
      if(a.isMC && b.isMC) return 0; // both done — relative order doesn't matter
      // Both still live: sort by actual score, best (lowest) first. This is the
      // real fix — sorting by prize alone left ties (very common, since payout
      // brackets are broad) in arbitrary order instead of true score order.
      const as=(a.sc && typeof a.sc.score==='number')?a.sc.score:Infinity;
      const bs=(b.sc && typeof b.sc.score==='number')?b.sc.score:Infinity;
      return as-bs;
    });
    let body='', dividerDone=false;
    sorted.forEach((r,i)=>{
      if(!dividerDone && i>0){
        if(cutHappened){
          if(r.isMC){ body+=cutDividerRow('final'); dividerDone=true; }
        } else if(projCutScore!=null){
          const s=(r.sc && typeof r.sc.score==='number')?r.sc.score:null;
          if(s!=null && s>projCutScore){ body+=cutDividerRow('proj',projCutScore); dividerDone=true; }
        }
      }
      body+=`<tr><td class="gname ${r.isMC?'mc':''}">${esc(r.golfer)}${r.isMC?`<span class="mc-tag">${r.tag}</span>`:''}</td>
      <td class="c pos">${r.sc?(r.isMC?'—':r.sc.pos):'—'}</td>
      <td class="c score" style="${r.isMC?'color:var(--red-soft)':''}">${scoreStr(r.sc)}</td>
      <td class="c prize">${r.prize?fmt(r.prize):'—'}</td></tr>`;
    });
    return `<div class="panel"><div class="panel-head"><h2>${esc(o.name)} <span style="color:var(--muted);font-weight:600">· ${esc(o.team||'')}</span></h2><span class="meta">${fmt(o.total)}</span></div>
      <table><thead><tr><th>Golfer</th><th class="c">Pos</th><th class="c">Score</th><th class="c">Prize</th></tr></thead>
      <tbody>${body}<tr class="total-row"><td>Total</td><td></td><td></td><td class="c prize">${fmt(o.total)}</td></tr></tbody></table></div>`;
  }).join('');
  const dt=document.getElementById('lbDetail'); if(dt) dt.innerHTML=detail;

  // animate any position changes (overtakes)
  if(JSON.stringify(orderNow)!==JSON.stringify(prevOrder)){
    showArrows(orderNow);
    prevOrder=orderNow.slice();
  }
}
function positionRows(st,bk,any,hasBk,instant){
  const medals=['🥇','🥈','🥉'];
  const ord=['1st','2nd','3rd','4th','5th','6th','7th','8th','9th','10th'];
  const lastId = (any && st.length>1) ? st[st.length-1].id : null;
  st.forEach((o,i)=>{
    const r=lbNodes[o.id]; if(!r) return;
    if(instant) r.style.transition='none'; else r.style.transition='';
    r.style.transform=`translateY(${i*ROWH}px)`;
    r.classList.toggle('leader', any && i===0);
    r.classList.toggle('bwatch', o.id===lastId);
    const isLast=o.id===lastId;
    const pct=(bk[o.id]!=null)?bk[o.id]:null;
    r.querySelector('.num').textContent = i+1;
    r.querySelector('.lb-who b').textContent=o.name;
    r.querySelector('.lb-who i').textContent=o.team||'';
    const cs=r.querySelector('.chipspot');
    if(isLast){ cs.className='chip watch chipspot'; cs.textContent='🍳 '+(pct!=null?pct+'% ':'')+'WATCH'; }
    else if(hasBk && pct!=null){ cs.className='chip'+(pct<=8?' warm':'')+' chipspot'; cs.textContent=pct+'%'; }
    else { cs.className='chip chipspot'; cs.textContent=any?'—':'·'; }
    const amt=r.querySelector('.lb-amt');
    const newAmt=fmt(o.total);
    if(!instant && amt.dataset.v && amt.dataset.v!==newAmt){ amt.classList.remove('flash'); void amt.offsetWidth; amt.classList.add('flash'); }
    amt.dataset.v=newAmt;
    amt.innerHTML=newAmt+`<span class="metaline">${o.alive} alive · ${o.mc} cut</span>`;
    if(instant){ void r.offsetWidth; r.style.transition=''; }
  });
}
function showArrows(orderNow){
  STATE.owners.forEach(o=>{
    const was=prevOrder.indexOf(o.id), now=orderNow.indexOf(o.id);
    const node=lbNodes[o.id]; if(!node) return;
    const ar=node.querySelector('.arrow'); if(!ar) return;
    ar.className='arrow';
    if(was!==-1 && now!==-1 && now<was){ ar.textContent='▲'; ar.classList.add('up','show'); node.classList.add('bump'); confettiIf(now===0,node); }
    else if(was!==-1 && now!==-1 && now>was){ ar.textContent='▼'; ar.classList.add('down','show'); }
    if(now!==was) setTimeout(()=>{ ar.classList.remove('show'); node.classList.remove('bump'); },3200);
  });
}
function confettiIf(isNewLeader,node){
  if(!isNewLeader) return;
  const cols=getComputedStyle(document.documentElement).getPropertyValue('--goldB')||'#e8c877';
  const palette=[cols.trim()||'#e8c877','#f4efe2','#c9a24e','#9fb295'];
  for(let i=0;i<20;i++){
    const c=document.createElement('div'); c.className='confetti';
    c.style.background=palette[i%palette.length]; c.style.left=(15+Math.random()*65)+'%';
    node.appendChild(c);
    const dx=(Math.random()-.5)*170, dy=45+Math.random()*55, rot=Math.random()*720;
    c.animate([{transform:'translate(0,0) rotate(0)',opacity:1},{transform:`translate(${dx}px,${dy}px) rotate(${rot}deg)`,opacity:0}],
      {duration:1000+Math.random()*500,easing:'cubic-bezier(.2,.6,.3,1)'}).onfinish=()=>c.remove();
  }
}

function renderGrid(){
  const all={}; STATE.owners.forEach(o=>(o.picks||[]).forEach(g=>{all[g]=(all[g]||0)+1;}));
  let golfers=Object.keys(all);
  golfers.sort((a,b)=>{ if(all[b]!==all[a])return all[b]-all[a];
    const pa=scoreFor(a),pb=scoreFor(b);
    const na=pa?parseInt(String(pa.pos).replace(/\D/g,''))||999:999;
    const nb=pb?parseInt(String(pb.pos).replace(/\D/g,''))||999:999; return na-nb; });
  const tiers={}; golfers.forEach(g=>{const t=all[g];(tiers[t]=tiers[t]||[]).push(g);});
  const owners=STATE.owners,maxT=owners.length;
  let rows='';
  for(let t=maxT;t>=1;t--){ if(!tiers[t])continue;
    const label=t===maxT?`Picked by all ${maxT}`:(t===1?'Unique — 1 owner':`${t} of ${maxT}`);
    rows+=`<tr class="tier-row ${t===maxT?'t4':t===maxT-1?'t3':''}"><td colspan="${owners.length+3}">${label}</td></tr>`;
    tiers[t].forEach(g=>{ const sc=scoreFor(g),tag=doneStatus(sc),isMC=!!tag;
      const gKeys=nameKeys(g);
      const checks=owners.map(o=>{ const has=(o.picks||[]).some(p=>{ const pKeys=nameKeys(p); return pKeys.some(pk=>gKeys.includes(pk)); });
        return has?`<td class="c"><span class="chk ${isMC?'no-cut':'yes'}">${isMC?'✕':'✓'}</span></td>`:'<td class="c"></td>'; }).join('');
      rows+=`<tr><td class="gname ${isMC?'mc':''}">${esc(g)}${isMC?`<span class="mc-tag">${tag}</span>`:''}</td>
        <td class="c pos">${sc?(isMC?'—':sc.pos):'—'}</td>
        <td class="c score" style="${isMC?'color:var(--red-soft)':''}">${scoreStr(sc)}</td>${checks}</tr>`; });
  }
  const head=`<tr><th>Golfer</th><th class="c">Pos</th><th class="c">Score</th>${owners.map(o=>`<th class="c">${esc(o.name)}</th>`).join('')}</tr>`;
  document.getElementById('view-grid').innerHTML=`<div class="panel"><div class="panel-head"><h2>Picks Grid</h2><span class="meta">${golfers.length} golfers · ${owners.length} owners</span></div><table><thead>${head}</thead><tbody>${rows||'<tr><td colspan="9" style="padding:30px;text-align:center;color:var(--muted)">Teams not set yet.</td></tr>'}</tbody></table><div class="hint">Green ✓ = made cut · red ✕ = missed cut. Grouped by how many owners share each golfer — the unique picks at the bottom are where pools are won and lost.</div></div>`;
}

// Real Leaderboard — the actual tournament field (not just picked golfers),
// refreshing on the same cycle as everything else. Marks which golfers are
// picked in this pool, so it doubles as quick context, not just a mirror of
// a real golf site.
function renderReal(){
  const scores=STATE.scores||{};
  const pickedKeys=new Set();
  STATE.owners.forEach(o=>(o.picks||[]).forEach(p=>{ nameKeys(p).forEach(k=>pickedKeys.add(k)); }));

  const entries=Object.entries(scores).map(([key,sc])=>({key,sc,tag:doneStatus(sc)}));
  entries.sort((a,b)=>{
    if(!!a.tag!==!!b.tag) return a.tag?1:-1; // done (MC/DQ/WD) sinks to bottom
    if(a.tag&&b.tag) return (a.sc.name||'').localeCompare(b.sc.name||'');
    const as=typeof a.sc.score==='number'?a.sc.score:9999;
    const bs=typeof b.sc.score==='number'?b.sc.score:9999;
    return as-bs;
  });

  const rows=entries.map(({key,sc,tag})=>{
    const isPicked=pickedKeys.has(key);
    const thru=(!tag && sc.thru!=null)?(sc.thru>=18?'F':String(sc.thru)):'—';
    const cutOdds=(!tag && sc.makeCut!=null)?Math.round(sc.makeCut*100)+'%':'—';
    return `<tr>
      <td class="c pos">${tag?'—':esc(sc.pos||'—')}</td>
      <td class="gname ${tag?'mc':''}">${esc(sc.name||key)}${tag?`<span class="mc-tag">${tag}</span>`:''}${isPicked?' <span title="Picked in this pool" style="color:var(--gold)">●</span>':''}</td>
      <td class="c score" style="${tag?'color:var(--red-soft)':''}">${scoreStr(sc)}</td>
      <td class="c">${thru}</td>
      <td class="c">${cutOdds}</td>
    </tr>`;
  }).join('');

  const head=`<tr><th class="c">Pos</th><th>Golfer</th><th class="c">Score</th><th class="c">Thru</th><th class="c">Cut Odds</th></tr>`;
  document.getElementById('view-real').innerHTML=`<div class="panel"><div class="panel-head"><h2>Real Leaderboard</h2><span class="meta">${entries.length} players${STATE.event_name?' · '+esc(STATE.event_name):''}</span></div><table><thead>${head}</thead><tbody>${rows||'<tr><td colspan="5" style="padding:30px;text-align:center;color:var(--muted)">No live scores yet — check back once the round starts.</td></tr>'}</tbody></table><div class="hint">The actual tournament field, refreshing the same as everything else. <span style="color:var(--gold)">●</span> marks a golfer picked in this pool.</div></div>`;
}

function pickOptionsHTML(field, current, takenSet){
  const opts = ['<option value="">Select golfer…</option>'];
  // always include the current pick even if it's not in the field (e.g. WD, or field not loaded yet)
  if(current && !field.includes(current)){
    opts.push(`<option value="${esc(current)}" selected>${esc(current)} (not in field)</option>`);
  }
  field.forEach(name=>{
    const disabled = takenSet.has(name) && name!==current;
    if(disabled) return; // hide golfers already picked elsewhere on this team
    opts.push(`<option value="${esc(name)}" ${name===current?'selected':''}>${esc(name)}</option>`);
  });
  return opts.join('');
}
function renderSetup(){
  const owners=STATE.owners.map(o=>`<div class="owner-edit" data-id="${o.id}">
    <div class="owner-edit-head">
      <input class="inp team" value="${esc(o.team||'')}" placeholder="Team name" onchange="upd(${o.id},'team',this.value)">
      <input class="inp sm" value="${esc(o.name)}" placeholder="Owner" onchange="upd(${o.id},'name',this.value)">
      <button class="rm-owner" onclick="rmOwner(${o.id})">Remove</button></div>
    <div class="upload-row">
      <input type="file" accept="image/*" id="file-${o.id}" style="display:none" onchange="uploadTeamShot(${o.id}, this)">
      <button class="btn ghost upbtn" id="upbtn-${o.id}" onclick="document.getElementById('file-${o.id}').click()">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
        Fill from screenshot
      </button>
      <span class="upnote" id="upnote-${o.id}"></span>
    </div>
    <div class="picks-list">${(()=>{
      const field=STATE.field||[];
      const taken=new Set((o.picks||[]).filter(Boolean));
      return (o.picks||[]).map((p,i)=>{
        const control = field.length
          ? `<select class="inp pickselect" onchange="updPick(${o.id},${i},this.value)">${pickOptionsHTML(field,p,taken)}</select>`
          : `<input class="inp" value="${esc(p)}" placeholder="Golfer name" onchange="updPick(${o.id},${i},this.value)">`;
        return `<div class="pick-row"><span class="num">${i+1}</span>${control}<button class="del" onclick="rmPick(${o.id},${i})">×</button></div>`;
      }).join('');
    })()}</div>
    <button class="btn ghost" style="margin-top:10px;font-size:12px" onclick="addPick(${o.id})">+ Add golfer</button></div>`).join('');
  document.getElementById('view-setup').innerHTML=`<div class="panel"><div class="panel-head"><h2>Teams &amp; picks</h2><span class="meta">${STATE.owners.length} owners</span></div>
    <div class="purse-display" style="margin:0 0 16px;padding:12px 14px;border:1px solid var(--edge);border-radius:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <label style="font-size:11.5px;color:var(--muted);font-weight:700;letter-spacing:.03em">TOURNAMENT PURSE</label>
      <span style="font-size:16px;font-weight:700;color:var(--cream)">${fmt(STATE.purse)}</span>
      ${STATE.purse_event_name && STATE.purse_event_name===STATE.event_name
        ? `<span class="verify-tag match" style="font-size:11px">✓ Confirmed for this event</span>`
        : `<span class="verify-tag mismatch" style="font-size:11px">⚠ Not yet confirmed</span>`}
      <span style="font-size:12px;color:var(--muted);width:100%">Pulled automatically once per tournament — not editable here, same as scores and prize money.</span>
      ${LAST_PURSE_ERROR ? `<div style="width:100%;margin-top:4px;padding:9px 12px;border:1px solid #5a2018;background:rgba(192,57,43,.12);border-radius:9px;color:var(--red-soft);font-weight:600;font-size:12.5px">Auto-purse lookup issue: ${esc(LAST_PURSE_ERROR)} — showing the last known value above until this resolves on its own.</div>` : ''}
    </div>
    <div class="setup">${owners}<button class="btn primary" onclick="addOwner()">+ Add owner</button>
    <button class="btn" style="margin-left:8px" onclick="saveTeams()">Save changes</button></div>
    <div class="hint">Beta: this page is open to everyone with the link — anyone can add or edit any team. Pick each golfer from the dropdown, built from this week's actual tournament field and auto-updating for every major. (If the field hasn't loaded yet, plain text boxes show instead.) You can still tap <b>Fill from screenshot</b> to fill 10 at once. Click <b>Save changes</b> and everyone's board updates live.
    ${(!STATE.field || STATE.field.length===0) && LAST_FIELD_ERROR ? `<div style="margin-top:10px;padding:10px 12px;border:1px solid #5a2018;background:rgba(192,57,43,.12);border-radius:9px;color:var(--red-soft);font-weight:600">No player dropdown yet — here's why: ${esc(LAST_FIELD_ERROR)}</div>` : ''}
    </div></div>`;
}
function render(){
  if(view==='board')renderBoard(); else if(view==='grid')renderGrid(); else if(view==='real')renderReal(); else renderSetup();
  const evn = STATE.event_name && STATE.event_name!=='Tournament' ? STATE.event_name : '';
  document.getElementById('evLine').textContent = evn ? (evn + (STATE.purse?(' · '+fmt(STATE.purse)):'')) : '';
}

/* =================== ADMIN EDITS =================== */
function upd(id,f,v){ const o=STATE.owners.find(x=>x.id===id); if(o)o[f]=v; }
function updPick(id,i,v){ const o=STATE.owners.find(x=>x.id===id); if(o)o.picks[i]=v; }
function rmPick(id,i){ const o=STATE.owners.find(x=>x.id===id); if(o){o.picks.splice(i,1); renderSetup();} }
function addPick(id){ const o=STATE.owners.find(x=>x.id===id); if(o){o.picks=o.picks||[];o.picks.push(''); renderSetup();} }
async function uploadTeamShot(id, input){
  const file = input.files && input.files[0];
  if(!file) return;
  const btn = document.getElementById('upbtn-'+id);
  const note = document.getElementById('upnote-'+id);
  btn.classList.add('spin'); note.className='upnote'; note.textContent='Reading screenshot…';
  try{
    const dataUrl = await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); });
    const base64 = String(dataUrl).split(',')[1];
    const mediaType = (String(dataUrl).match(/data:(.*?);/)||[])[1] || 'image/png';
    const r = await fetch('/api/parse-team',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({imageBase64:base64, mediaType})});
    const d = await r.json();
    if(!r.ok){ note.className='upnote err'; note.textContent = (d.error||'Could not read image') + (d.detail?(' — '+d.detail):''); return; }
    const players = (d.players||[]).slice(0,10);
    if(!players.length){ note.className='upnote err'; note.textContent='No players found — try a clearer screenshot'; return; }
    const o = STATE.owners.find(x=>x.id===id);
    if(o){ o.picks = players; renderSetup();
      const n2=document.getElementById('upnote-'+id); if(n2){ n2.className='upnote ok'; n2.textContent='Filled '+players.length+' players ✓ — review, then Save changes'; } }
  }catch(e){ note.className='upnote err'; note.textContent='Upload failed: '+e.message; }
  finally{ const b=document.getElementById('upbtn-'+id); if(b) b.classList.remove('spin'); input.value=''; }
}
function addOwner(){ const nid=Math.max(0,...STATE.owners.map(o=>o.id||0))+1;
  STATE.owners.push({id:nid,name:'New owner',team:'New Team',picks:['']}); renderSetup(); }
function rmOwner(id){ if(!confirm('Remove this owner?'))return; STATE.owners=STATE.owners.filter(o=>o.id!==id); renderSetup(); }
async function saveTeams(){
  // Safety: never silently overwrite real teams with an empty roster,
  // and never save before the real data has finished loading.
  if(!dataLoaded){ toast('Still loading — wait a moment and try again','err'); return; }
  if(!STATE.owners || STATE.owners.length===0){
    const ok = confirm('You are about to save with ZERO teams — this will erase everyone\'s picks. Are you sure?');
    if(!ok) return;
  }
  try{
    const r=await fetch('/api/save',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({owners:STATE.owners})});
    const d=await r.json();
    if(!r.ok){ toast(d.error||'Save failed','err'); return; }
    builtSig=''; // owners may have changed; rebuild board shell next time
    render();
    toast('Saved — everyone\'s board updated');
  }catch(e){ toast('Save failed','err'); }
}

/* =================== VERIFY PAYOUTS =================== */
// Cross-checks our own live-computed standings against two independent
// sources once the tournament is over. IMPORTANT: this is a second opinion,
// not a guarantee — a "match" means two-to-three independent sources agree,
// which is strong reassurance, but no automated check can promise zero
// mistakes. Always worth a quick glance at the official leaderboard too,
// especially the first few times this runs for real money.
function posNumeric(pos){
  if(pos==null) return null;
  const s=String(pos).toUpperCase();
  if(/MC|CUT|WD|DQ/.test(s)) return 'MC';
  const n=parseInt(s.replace(/[^0-9]/g,''),10);
  return isNaN(n)?null:n;
}
async function openVerifyModal(){
  document.getElementById('verifyModal').style.display='flex';
  const body=document.getElementById('verifyBody');
  body.innerHTML='<p style="color:var(--muted)">Fetching official results from Data Golf and RapidAPI…</p>';
  try{
    const r=await fetch('/api/verify');
    const d=await r.json();
    renderVerifyReport(d);
  }catch(e){
    body.innerHTML=`<p style="color:var(--red-soft)">Could not load verification data: ${esc(e.message)}</p>`;
  }
}
function closeVerifyModal(){ document.getElementById('verifyModal').style.display='none'; }

function renderVerifyReport(d){
  const body=document.getElementById('verifyBody');
  const golferSet=new Set();
  STATE.owners.forEach(o=>(o.picks||[]).forEach(g=>{ if(g) golferSet.add(g); }));
  const golfers=[...golferSet];

  let mismatches=0, checked=0;
  const rows = golfers.map(g=>{
    const sc = scoreFor(g);
    const ourPos = sc ? sc.pos : null;
    const ourPrize = sc ? prizeForGolfer(g) : 0;
    let officialEntry=null, rapidEntry=null;
    if(d.official_rows){ for(const k of nameKeys(g)){ if(d.official_rows[k]){ officialEntry=d.official_rows[k]; break; } } }
    if(d.rapid_rows){ for(const k of nameKeys(g)){ if(d.rapid_rows[k]){ rapidEntry=d.rapid_rows[k]; break; } } }

    let status='nodata', note='';
    const ourP = posNumeric(ourPos);
    if(officialEntry || rapidEntry){
      checked++;
      const offP = officialEntry ? posNumeric(officialEntry.pos) : null;
      const rapP = rapidEntry ? posNumeric(rapidEntry.pos) : null;
      const knownPositions = [ourP,offP,rapP].filter(x=>x!=null);
      const allPosMatch = knownPositions.every(x=>x===knownPositions[0]);
      let prizeOk=true;
      if(officialEntry && officialEntry.earnings!=null && ourPrize){
        const diff=Math.abs(officialEntry.earnings-ourPrize);
        prizeOk = diff <= Math.max(2000, ourPrize*0.03); // small tolerance for rounding conventions
      }
      if(allPosMatch && prizeOk){ status='match'; }
      else { status='mismatch'; mismatches++; note = !allPosMatch ? 'Position disagreement' : 'Prize amount differs'; }
    }
    return {golfer:g, ourPos, ourPrize, officialEntry, rapidEntry, status, note};
  });

  const sourceNotes=[];
  if(d.official_diag) sourceNotes.push('Data Golf official earnings: '+d.official_diag);
  else if(d.official_matched_name) sourceNotes.push(`Data Golf official earnings: matched "${d.official_matched_name}" ✓`);
  if(d.rapid_diag) sourceNotes.push('RapidAPI final leaderboard: '+d.rapid_diag);
  else if(d.rapid_matched_name) sourceNotes.push(`RapidAPI final leaderboard: matched "${d.rapid_matched_name}" ✓`);

  let banner;
  if(checked===0){
    banner = `<div class="verify-banner warn">No independent source could be matched for "${esc(d.event_name||'this event')}" yet. Don't treat this as verified — check the tournament's official leaderboard/payout page manually before settling real money.</div>`;
  } else if(mismatches===0){
    banner = `<div class="verify-banner ok">✓ All ${checked} checked golfers agree with at least one independent source. Still worth a quick manual glance for real money, but no discrepancies found.</div>`;
  } else {
    banner = `<div class="verify-banner warn">⚠ ${mismatches} of ${checked} checked golfers disagree with an independent source — review these carefully before paying out.</div>`;
  }

  const tableRows = rows.map(r=>`<tr>
    <td>${esc(r.golfer)}</td>
    <td>${esc(r.ourPos||'—')} / ${r.ourPrize?fmt(r.ourPrize):'—'}</td>
    <td>${r.officialEntry?esc(r.officialEntry.pos||'—')+' / '+(r.officialEntry.earnings!=null?fmt(r.officialEntry.earnings):'—'):'—'}</td>
    <td>${r.rapidEntry?esc(r.rapidEntry.pos||'—'):'—'}</td>
    <td><span class="verify-tag ${r.status}">${r.status==='match'?'Match':r.status==='mismatch'?'Mismatch':'No data'}</span>${r.note?` <span style="color:var(--muted);font-size:11px">${esc(r.note)}</span>`:''}</td>
  </tr>`).join('');

  body.innerHTML = `
    ${banner}
    <div class="verify-source-note">
      ${sourceNotes.map(esc).join('<br>')}<br><br>
      Checks every golfer on someone's team against Data Golf's official post-tournament earnings and RapidAPI's independent final leaderboard. Small prize differences (a few thousand dollars) are treated as rounding, not a mismatch.
    </div>
    <table class="verify-table">
      <thead><tr><th>Golfer</th><th>Our pos / prize</th><th>Official pos / earnings</th><th>RapidAPI pos</th><th>Status</th></tr></thead>
      <tbody>${tableRows || '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:20px">No teams set yet.</td></tr>'}</tbody>
    </table>
  `;
}

/* =================== REFRESH =================== */
async function manualRefresh(){
  const b=document.getElementById('refreshBtn');
  if(b.disabled) return; // guards against overlap (auto-timer + a manual click racing)
  b.disabled = true; b.classList.add('spin');
  await loadState(true);
  b.disabled = false; b.classList.remove('spin');
}
// Auto-refresh every 10s for a live-feeling leaderboard. The server enforces
// its own minimum interval between REAL upstream calls (shared across every
// visitor), so polling from the browser this often is safe even with several
// people on the page at once — most polls just return the cached state fast.
let autoTimer = null;
function startAutoRefresh(){
  if(autoTimer) return;
  autoTimer = setInterval(()=>{ if(!document.hidden) manualRefresh(); }, 10000);
}
document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) manualRefresh(); });

let toastT;
function toast(m,t){ const el=document.getElementById('toast'); el.textContent=m; el.className='toast show'+(t==='err'?' err':''); clearTimeout(toastT); toastT=setTimeout(()=>el.className='toast', t==='err'?7000:2600); }

/* =================== INIT =================== */
// Teams tab is visible to everyone during the beta — nothing to toggle here.
applyTheme();
manualRefresh();
startAutoRefresh();
</script>
